name: 内核源码拉取 - Android 13 (5.15)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
  workflow_call:

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.set_tag.outputs.release_tag }}
    steps:
      - name: 生成 Release 标签
        id: set_tag
        run: echo "release_tag=android13-5.15-sources-${{ github.run_number }}" >> $GITHUB_OUTPUT
      - name: 创建 Release（如果不存在）
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.set_tag.outputs.release_tag }}"
          if ! gh release view "$TAG" -R ${{ github.repository }} &>/dev/null; then
            gh release create "$TAG" -R ${{ github.repository }} \
              --title "Android 13 (5.15) 内核源码 - 运行 #${{ github.run_number }}" \
              --notes "包含所有安全补丁版本的源码分卷，请下载所有分卷及校验文件后合并解压。"
          else
            echo "Release $TAG 已存在，跳过创建。"
          fi

  publish-sources:
    name: "5.15.${{ matrix.sub_level }}-${{ matrix.os_patch_level }}"
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - sub_level: "74"
            os_patch_level: "2023-01"
          - sub_level: "78"
            os_patch_level: "2023-03"
          - sub_level: "94"
            os_patch_level: "2023-05"
          - sub_level: "104"
            os_patch_level: "2023-07"
          - sub_level: "119"
            os_patch_level: "2023-09"
          - sub_level: "123"
            os_patch_level: "2023-11"
          - sub_level: "137"
            os_patch_level: "2024-01"
          - sub_level: "144"
            os_patch_level: "2024-03"
          - sub_level: "148"
            os_patch_level: "2024-05"
          - sub_level: "149"
            os_patch_level: "2024-07"
          - sub_level: "151"
            os_patch_level: "2024-08"
          - sub_level: "153"
            os_patch_level: "2024-09"
          - sub_level: "167"
            os_patch_level: "2024-11"
          - sub_level: "170"
            os_patch_level: "2025-01"
          - sub_level: "178"
            os_patch_level: "2025-03"
          - sub_level: "180"
            os_patch_level: "2025-05"
          - sub_level: "185"
            os_patch_level: "2025-07"
          - sub_level: "189"
            os_patch_level: "2025-09"
          - sub_level: "194"
            os_patch_level: "2025-12"
          - sub_level: "X"
            os_patch_level: "lts"
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      android_version: "android13"
      kernel_version: "5.15"
      sub_level: ${{ matrix.sub_level }}
      os_patch_level: ${{ matrix.os_patch_level }}
      release_tag: ${{ needs.create-release.outputs.release_tag }}
