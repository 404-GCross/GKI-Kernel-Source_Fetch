name: 内核源码拉取 - Android 15 (6.6)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
  workflow_call:

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.set_tag.outputs.release_tag }}
    steps:
      - name: 生成 Release 标签
        id: set_tag
        run: echo "release_tag=android15-6.6-sources-${{ github.run_number }}" >> $GITHUB_OUTPUT
      - name: 创建 Release（如果不存在）
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.set_tag.outputs.release_tag }}"
          if ! gh release view "$TAG" -R ${{ github.repository }} &>/dev/null; then
            gh release create "$TAG" -R ${{ github.repository }} \
              --title "Android 15 (6.6) 内核源码 - 运行 #${{ github.run_number }}" \
              --notes "包含所有安全补丁版本的源码分卷，请下载所有分卷及校验文件后合并解压。"
          else
            echo "Release $TAG 已存在，跳过创建。"
          fi

  publish-sources:
    name: "6.6.${{ matrix.sub_level }}-${{ matrix.os_patch_level }}"
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - sub_level: "50"
            os_patch_level: "2024-10"
          - sub_level: "56"
            os_patch_level: "2024-11"
          - sub_level: "57"
            os_patch_level: "2024-12"
          - sub_level: "58"
            os_patch_level: "2025-01"
          - sub_level: "66"
            os_patch_level: "2025-02"
          - sub_level: "77"
            os_patch_level: "2025-03"
          - sub_level: "82"
            os_patch_level: "2025-04"
          - sub_level: "87"
            os_patch_level: "2025-05"
          - sub_level: "89"
            os_patch_level: "2025-06"
          - sub_level: "92"
            os_patch_level: "2025-07"
          - sub_level: "98"
            os_patch_level: "2025-09"
          - sub_level: "102"
            os_patch_level: "2025-10"
          - sub_level: "118"
            os_patch_level: "2026-01"
          - sub_level: "127"
            os_patch_level: "2026-04"
          - sub_level: "X"
            os_patch_level: "lts"
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      android_version: "android15"
      kernel_version: "6.6"
      sub_level: ${{ matrix.sub_level }}
      os_patch_level: ${{ matrix.os_patch_level }}
      release_tag: ${{ needs.create-release.outputs.release_tag }}
