name: 内核源码拉取

permissions:
  contents: write
  actions: write

on:
  workflow_call:
    inputs:
      android_version:
        required: true
        type: string
      kernel_version:
        required: true
        type: string
      sub_level:
        required: true
        type: string
      os_patch_level:
        required: true
        type: string
      release_tag:
        required: false
        type: string
        default: ''

jobs:
  publish-source:
    name: "源码 ${{ inputs.kernel_version }}.${{ inputs.sub_level }}-${{ inputs.os_patch_level }}"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 打印配置摘要
        run: |
          echo "========================================"
          echo "       内核源码拉取配置"
          echo "========================================"
          echo "Android 版本  : ${{ inputs.android_version }}"
          echo "内核版本      : ${{ inputs.kernel_version }}"
          echo "子版本号      : ${{ inputs.sub_level }}"
          echo "补丁级别      : ${{ inputs.os_patch_level }}"
          echo "========================================"

      - name: 清理磁盘空间
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rmz"
          rmz_version: "3.1.1"
          testing: false

      - name: 检出代码仓库
        uses: actions/checkout@v6

      - name: 初始化目录与环境变量
        run: |
          CONFIG="${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.sub_level }}"
          KERNEL_ROOT="$GITHUB_WORKSPACE/$CONFIG"
          mkdir -p "$KERNEL_ROOT"

          cat >> $GITHUB_ENV << EOF
          CONFIG=$CONFIG
          KERNEL_ROOT=$KERNEL_ROOT
          EOF

          mkdir -p "$GITHUB_WORKSPACE/git-repo"
          curl -L https://storage.googleapis.com/git-repo-downloads/repo -o "$GITHUB_WORKSPACE/git-repo/repo"
          chmod 0755 "$GITHUB_WORKSPACE/git-repo/repo"
          echo "$GITHUB_WORKSPACE/git-repo" >> "$GITHUB_PATH"
          echo "REPO=$GITHUB_WORKSPACE/git-repo/repo" >> $GITHUB_ENV

      - name: 配置 Git
        run: |
          git config --global user.name "BuildBot"
          git config --global user.email "BuildGkiKernel@gmail.com"

      - name: 同步内核源码
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          FORMATTED_BRANCH="${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.os_patch_level }}"
          echo "初始化 repo，分支: common-${FORMATTED_BRANCH}"

          $REPO init --depth=1 -u https://android.googlesource.com/kernel/manifest -b common-${FORMATTED_BRANCH} --repo-rev=v2.16

          REMOTE_BRANCH=$(git ls-remote https://android.googlesource.com/kernel/common ${FORMATTED_BRANCH})
          DEFAULT_MANIFEST_PATH=.repo/manifests/default.xml

          if grep -q deprecated <<< "$REMOTE_BRANCH"; then
            echo "检测到已弃用的分支，调整 manifest"
            sed -i "s/\"${FORMATTED_BRANCH}\"/\"deprecated\/${FORMATTED_BRANCH}\"/g" $DEFAULT_MANIFEST_PATH
          fi

          $REPO --trace sync -c -j$(nproc --all) --no-tags --fail-fast

      - name: 提取实际子版本号
        run: |
          ACTUAL_SUBLEVEL="${{ inputs.sub_level }}"
          if [[ -f "$KERNEL_ROOT/common/Makefile" ]]; then
            EXTRACTED=$(grep '^SUBLEVEL = ' "$KERNEL_ROOT/common/Makefile" | awk '{print $3}')
            [[ -n "$EXTRACTED" ]] && ACTUAL_SUBLEVEL="$EXTRACTED"
          fi
          echo "ACTUAL_SUBLEVEL=$ACTUAL_SUBLEVEL" >> $GITHUB_ENV
          REAL_CONFIG="${{ inputs.android_version }}-${{ inputs.kernel_version }}-${ACTUAL_SUBLEVEL}"
          echo "REAL_CONFIG=$REAL_CONFIG" >> $GITHUB_ENV
          echo "实际子版本号: $ACTUAL_SUBLEVEL → 配置标识: $REAL_CONFIG"

      - name: 分卷压缩内核源码
        run: |
          ARCHIVE_BASE="kernel-source-${{ env.REAL_CONFIG }}.tar.gz"
          echo "压缩 $KERNEL_ROOT 到分卷，排除 .repo 和 .git 目录"
          tar czf - -C "$KERNEL_ROOT" --exclude='.repo' --exclude-vcs . | split -b 2000M - "$GITHUB_WORKSPACE/$ARCHIVE_BASE.part"
          echo "分卷列表："
          ls -lh "$GITHUB_WORKSPACE/$ARCHIVE_BASE.part"*
          cd "$GITHUB_WORKSPACE"
          sha256sum $ARCHIVE_BASE.part* > "$ARCHIVE_BASE.sha256"
          echo "ARCHIVE_BASE=$ARCHIVE_BASE" >> $GITHUB_ENV

      - name: 生成拉取脚本
        run: |
          # 头部动态写入当前仓库和标签
          cat > ${{ github.workspace }}/fetch_kernel_source.sh <<'SCRIPTHEAD'
          #!/usr/bin/env bash
          set -euo pipefail
          REPO="${{ github.repository }}"
          TAG="${{ inputs.release_tag }}"
          SCRIPTHEAD
          # 主体部分（包含增强的依赖检查）
          cat >> ${{ github.workspace }}/fetch_kernel_source.sh <<'SCRIPTBODY'

          BASE_RAW="https://github.com/${REPO}/releases/download/${TAG}"
          OUTPUT_DIR="${OUTPUT_DIR:-${PWD}/kernel-sources}"
          KEEP_TARBALL="${KEEP_TARBALL:-no}"
          FLAT_OUTPUT="${FLAT_OUTPUT:-no}"

          SPEEDTEST_FILE="speedtest.mp4"

          MIRRORS=(
              "https://gh-proxy.com/"
              "https://gh.llkk.cc/"
              "https://gh.ddlc.top/"
              "https://hub.gitmirror.com/"
              "https://ghproxy.homeboyc.cn/"
              "https://ghproxy.com/"
              "https://gh.api.99988866.xyz/"
              "https://gh.con.sh/"
              "https://mirror.ghproxy.com/"
              "https://ghproxy.cc/"
          )

          declare -A VERSIONS=(
              ["android12-5.10"]="66 81 101 110 117 136 149 160 168 177 185 198 205 209 218 226 233 236 237 240 246 X"
              ["android13-5.15"]="74 78 94 104 119 123 137 144 148 149 151 153 167 170 178 180 185 189 194 X"
              ["android14-6.1"]="25 43 57 68 75 78 84 90 93 99 112 115 118 124 128 129 134 138 141 145 157 162 X"
              ["android15-6.6"]="50 56 57 58 66 77 82 87 89 92 98 102 118 127 X"
              ["android16-6.12"]="23 30 38 58"
          )

          RED='\033[0;31m'; GREEN='\033[0;32m'; YELLOW='\033[1;33m'; NC='\033[0m'

          # 增强依赖检查：确保 curl、awk 等存在
          check_deps() {
              local missing=()
              if ! command -v curl &>/dev/null; then missing+=("curl"); fi
              if ! command -v awk &>/dev/null; then missing+=("gawk"); fi
              if [ ${#missing[@]} -gt 0 ]; then
                  echo -e "${YELLOW}缺少依赖: ${missing[*]}，正在尝试安装...${NC}"
                  if command -v apt-get &>/dev/null; then
                      sudo apt-get update -qq && sudo apt-get install -y ${missing[*]}
                  elif command -v dnf &>/dev/null; then
                      sudo dnf install -y ${missing[*]}
                  elif command -v yum &>/dev/null; then
                      sudo yum install -y ${missing[*]}
                  elif command -v pacman &>/dev/null; then
                      sudo pacman -S --noconfirm ${missing[*]}
                  else
                      echo -e "${RED}无法自动安装，请手动安装: ${missing[*]}${NC}"
                      exit 1
                  fi
              fi
          }

          select_option() {
              local prompt="$1"; shift
              local opts=("$@")
              echo -e "${YELLOW}$prompt${NC}" >&2
              select opt in "${opts[@]}"; do
                  if [[ -n "$opt" ]]; then echo "$opt"; return 0; fi
                  echo -e "${RED}无效选项${NC}" >&2
              done
          }

          speed_test() {
              local mirror="$1"
              local url="${mirror}${BASE_RAW}/${SPEEDTEST_FILE}"
              local tmpfile=$(mktemp)
              local start end size duration speed
              start=$(date +%s.%N)
              if curl -fSL --retry 1 --connect-timeout 10 --max-time 30 -o "$tmpfile" "$url" 2>/dev/null; then
                  end=$(date +%s.%N)
                  size=$(stat -c%s "$tmpfile" 2>/dev/null || stat -f%z "$tmpfile" 2>/dev/null)
                  duration=$(awk "BEGIN { printf \"%.2f\", $end - $start }")
                  if [[ "$size" -gt 0 ]]; then
                      speed=$(awk "BEGIN { printf \"%.1f\", $size / 1024 / $duration }")
                  else
                      speed="0.0"
                  fi
                  rm -f "$tmpfile"
                  printf "%s %.2f" "$speed" "$duration"
              else
                  rm -f "$tmpfile"
                  echo "FAIL"
              fi
          }

          download() {
              local path="$1"
              local dest="$2"
              local url="${MIRROR}${BASE_RAW}/${path}"
              curl -fSL --retry 3 --retry-delay 5 -# -o "$dest" "$url"
          }

          main() {
              check_deps

              IFS=$'\n' majors=($(for k in "${!VERSIONS[@]}"; do echo "$k"; done | sort))
              local major=$(select_option "选择内核大版本：" "${majors[@]}")

              IFS=' ' read -ra subs <<< "${VERSIONS[$major]}"
              local sub=$(select_option "选择小版本：" "${subs[@]}")

              local vid="${major}-${sub}"
              local sha="kernel-source-${vid}.tar.gz.sha256"
              echo -e "${GREEN}目标版本：${vid}${NC}"

              echo -e "${YELLOW}是否对镜像源进行测速（单源最长 30 秒，约 25.1MB 测试文件）？(y/n) [n]:${NC}"
              read -r do_speedtest
              local speed_results=()

              if [[ "$do_speedtest" == "y" || "$do_speedtest" == "Y" ]]; then
                  echo -e "${GREEN}正在测速（下载 speedtest.mp4），请耐心等待...${NC}"

                  echo -n "  直连 ... "
                  local direct_out
                  direct_out=$(speed_test "")
                  if [[ "$direct_out" == "FAIL" ]]; then
                      echo -e "${RED}失败（超时或无法连接）${NC}"
                  else
                      local direct_speed=$(echo "$direct_out" | awk '{print $1}')
                      local direct_time=$(echo "$direct_out" | awk '{print $2}')
                      echo -e "${GREEN}${direct_speed} KB/s (${direct_time}s)${NC}"
                      speed_results+=("$direct_speed $direct_time 直连（不使用镜像）")
                  fi

                  for mirror in "${MIRRORS[@]}"; do
                      echo -n "  $mirror ... "
                      local out
                      out=$(speed_test "$mirror")
                      if [[ "$out" == "FAIL" ]]; then
                          echo -e "${RED}失败（超时或无法连接）${NC}"
                      else
                          local m_speed=$(echo "$out" | awk '{print $1}')
                          local m_time=$(echo "$out" | awk '{print $2}')
                          echo -e "${GREEN}${m_speed} KB/s (${m_time}s)${NC}"
                          speed_results+=("$m_speed $m_time $mirror")
                      fi
                  done

                  if [[ ${#speed_results[@]} -gt 0 ]]; then
                      IFS=$'\n' sorted=($(sort -t' ' -k1 -rn <<< "${speed_results[*]}"))
                      unset IFS

                      echo -e "\n${GREEN}测速排名（速度越快越靠前）：${NC}"
                      local idx=1
                      local speed_opts=()
                      for line in "${sorted[@]}"; do
                          local sp=$(echo "$line" | awk '{print $1}')
                          local tm=$(echo "$line" | awk '{print $2}')
                          local nm=$(echo "$line" | cut -d' ' -f3-)
                          speed_opts+=("${sp} KB/s (${tm}s) - ${nm}")
                          printf "  %d) %s KB/s (%s s) - %s\n" "$idx" "$sp" "$tm" "$nm"
                          idx=$((idx + 1))
                      done
                      speed_opts+=("自定义镜像（手动输入URL）")
                      echo "  $idx) 自定义镜像（手动输入URL）"

                      echo -e "${YELLOW}请根据测速结果选择下载源（输入序号）：${NC}"
                      local selected=$(select_option "" "${speed_opts[@]}")

                      if [[ "$selected" == "自定义镜像（手动输入URL）" ]]; then
                          read -p "请输入镜像URL（示例：https://gh.llkk.cc/，留空则直连）： " custom_url
                          if [[ -z "$custom_url" ]]; then MIRROR=""; else
                              [[ "$custom_url" != */ ]] && custom_url="${custom_url}/"
                              MIRROR="$custom_url"
                          fi
                      else
                          local chosen_name=$(echo "$selected" | sed -E 's/^[0-9.]* KB\/s \([0-9.]*s\) - //')
                          if [[ "$chosen_name" == "直连（不使用镜像）" ]]; then
                              MIRROR=""
                          else
                              MIRROR="$chosen_name"
                          fi
                      fi
                  else
                      echo -e "${RED}所有源测速均失败（30秒内无法完成下载），将手动选择下载源。${NC}"
                  fi
              fi

              if [[ -z "${MIRROR+x}" ]]; then
                  local all_sources=("直连（不使用镜像）" "${MIRRORS[@]}" "自定义镜像（手动输入URL）")
                  echo -e "${YELLOW}请选择下载源：${NC}"
                  local selected=$(select_option "" "${all_sources[@]}")
                  if [[ "$selected" == "自定义镜像（手动输入URL）" ]]; then
                      read -p "请输入镜像URL（示例：https://gh.llkk.cc/，留空则直连）： " custom_url
                      if [[ -z "$custom_url" ]]; then MIRROR=""; else
                          [[ "$custom_url" != */ ]] && custom_url="${custom_url}/"
                          MIRROR="$custom_url"
                      fi
                  elif [[ "$selected" == "直连（不使用镜像）" ]]; then
                      MIRROR=""
                  else
                      MIRROR="$selected"
                  fi
              fi

              echo -e "${GREEN}使用源：${MIRROR:-直连}${NC}"

              local tmpdir=$(mktemp -d -t kernel-dl-XXXXXX)
              trap "rm -rf '$tmpdir'" EXIT

              echo -e "${GREEN}[1/5] 下载校验文件...${NC}"
              download "$sha" "$tmpdir/$sha" || {
                  echo -e "${RED}下载校验文件失败，请更换下载源后重试${NC}"; exit 1
              }

              local parts=($(awk '{print $2}' "$tmpdir/$sha"))
              echo -e "${GREEN}[2/5] 下载 ${#parts[@]} 个分卷（进度条如下）...${NC}"
              for part in "${parts[@]}"; do
                  echo -n "   -> "
                  download "$part" "$tmpdir/$part" || {
                      echo -e "${RED}下载失败${NC}"; exit 1
                  }
              done

              echo -e "${GREEN}[3/5] 校验中...${NC}"
              (cd "$tmpdir" && sha256sum -c "$sha" --quiet) || {
                  echo -e "${RED}校验失败，请重新运行${NC}"; exit 1
              }
              echo -e "  ${GREEN}校验通过${NC}"

              local tar="kernel-source-${vid}.tar.gz"
              echo -e "${GREEN}[4/5] 合并分卷...${NC}"
              cat "${parts[@]/#/$tmpdir/}" > "$tmpdir/$tar"

              local dest
              if [[ "$FLAT_OUTPUT" == "yes" ]]; then
                  dest="$OUTPUT_DIR"
              else
                  dest="${OUTPUT_DIR}/kernel-source-${vid}"
              fi
              mkdir -p "$dest"
              echo -e "${GREEN}[5/5] 解压到 ${dest}${NC}"
              tar xzf "$tmpdir/$tar" -C "$dest"

              if [[ "$KEEP_TARBALL" == "yes" ]]; then
                  mv "$tmpdir/$tar" "${OUTPUT_DIR}/"
                  echo -e "  保留压缩包：${OUTPUT_DIR}/$tar"
              fi

              echo -e "\n${GREEN}===== 完成 =====${NC}"
              echo -e "源码路径：${dest}"
          }

          main
          SCRIPTBODY
          chmod +x ${{ github.workspace }}/fetch_kernel_source.sh

      - name: 上传分卷和脚本到统一 Release
        if: inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: |
            ${{ env.ARCHIVE_BASE }}.part*
            ${{ env.ARCHIVE_BASE }}.sha256
          fail_on_unmatched_files: false
