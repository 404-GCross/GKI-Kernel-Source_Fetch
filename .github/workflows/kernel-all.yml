    secrets: inherit
    with:
      android_version: ${{ matrix.android_version }}
      kernel_version: ${{ matrix.kernel_version }}
      sub_level: ${{ matrix.sub_level }}
      os_patch_level: ${{ matrix.os_patch_level }}
      release_tag: ${{ needs.create-release.outputs.release_tag }}

  # 更新脚本仓库中的 TAG 并推送
  update-script:
    runs-on: ubuntu-latest
    needs: [create-release, pull-sources]
    if: success()
    steps:
      - name: 检出脚本仓库
        uses: actions/checkout@v4
        with:
          repository: 404-GCross/GKI-Kernel-Source_Fetch
          ref: main
          token: ${{ secrets.SCRIPT_REPO_PAT }}   # 必须配置此 Secret

      - name: 修改 TAG 变量
        run: |
          NEW_TAG="${{ needs.create-release.outputs.release_tag }}"
          if [ -z "$NEW_TAG" ]; then
            echo "错误：release_tag 为空！"
            exit 1
          fi
          echo "更新 TAG 为：$NEW_TAG"
          sed -i "s/^TAG=.*/TAG=\"$NEW_TAG\"/" fetch_kernel_source.sh
          sed -i "s/^TAG=.*/TAG=\"$NEW_TAG\"/" fetch_kernel_source_no-extract.sh

      - name: 提交并推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fetch_kernel_source.sh fetch_kernel_source_no-extract.sh
          git diff --cached --quiet || git commit -m "自动更新 TAG 为 ${{ needs.create-release.outputs.release_tag }}"
          git push origin main
