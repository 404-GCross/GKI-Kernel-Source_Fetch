name: 一键拉取所有内核源码 (5.10~6.12)

permissions:
  contents: write
  actions: write

on:
  schedule:
    - cron: '0 0 */3 * *'        # 每3天 UTC 0:00 自动运行
  workflow_dispatch:

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.set_tag.outputs.release_tag }}
    steps:
      - name: 生成唯一 Release 标签
        id: set_tag
        run: |
          TAG="all-kernel-sources-$(date +%Y%m%d)-${{ github.run_id }}"
          echo "release_tag=${TAG}" >> $GITHUB_OUTPUT
          echo "标签：$TAG"

      - name: 创建 Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.set_tag.outputs.release_tag }}"
          gh release create "$TAG" -R ${{ github.repository }} \
            --title "全内核源码合集 - $(date +%F)" \
            --notes "包含 Android 12~16 的 5.10/5.15/6.1/6.6/6.12 内核源码分卷，请下载所有分卷及校验文件后合并解压。"

  pull-sources:
    name: "${{ matrix.android_version }}-${{ matrix.kernel_version }}.${{ matrix.sub_level }}"
