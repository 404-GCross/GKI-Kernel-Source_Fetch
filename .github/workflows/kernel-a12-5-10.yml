name: 内核源码拉取 - Android 12 (5.10)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
  workflow_call:

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.set_tag.outputs.release_tag }}
    steps:
      - name: 生成 Release 标签
        id: set_tag
        run: echo "release_tag=android12-5.10-sources-${{ github.run_number }}" >> $GITHUB_OUTPUT
      - name: 创建 Release（如果不存在）
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.set_tag.outputs.release_tag }}"
          if ! gh release view "$TAG" -R ${{ github.repository }} &>/dev/null; then
            gh release create "$TAG" -R ${{ github.repository }} \
              --title "Android 12 (5.10) 内核源码 - 运行 #${{ github.run_number }}" \
              --notes "包含所有安全补丁版本的源码分卷，请下载所有分卷及校验文件后合并解压。"
          else
            echo "Release $TAG 已存在，跳过创建。"
          fi

  publish-sources:
    name: "5.10.${{ matrix.sub_level }}-${{ matrix.os_patch_level }}"
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - sub_level: "66"
            os_patch_level: "2022-01"
          - sub_level: "81"
            os_patch_level: "2022-03"
          - sub_level: "101"
            os_patch_level: "2022-04"
          - sub_level: "110"
            os_patch_level: "2022-07"
          - sub_level: "117"
            os_patch_level: "2022-09"
          - sub_level: "136"
            os_patch_level: "2022-11"
          - sub_level: "149"
            os_patch_level: "2023-01"
          - sub_level: "160"
            os_patch_level: "2023-03"
          - sub_level: "168"
            os_patch_level: "2023-04"
          - sub_level: "177"
            os_patch_level: "2023-07"
          - sub_level: "185"
            os_patch_level: "2023-09"
          - sub_level: "198"
            os_patch_level: "2024-01"
          - sub_level: "205"
            os_patch_level: "2024-03"
          - sub_level: "209"
            os_patch_level: "2024-05"
          - sub_level: "218"
            os_patch_level: "2024-08"
          - sub_level: "226"
            os_patch_level: "2024-11"
          - sub_level: "233"
            os_patch_level: "2025-02"
          - sub_level: "236"
            os_patch_level: "2025-05"
          - sub_level: "237"
            os_patch_level: "2025-06"
          - sub_level: "240"
            os_patch_level: "2025-09"
          - sub_level: "246"
            os_patch_level: "2025-12"
          - sub_level: "X"
            os_patch_level: "lts"
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      android_version: "android12"
      kernel_version: "5.10"
      sub_level: ${{ matrix.sub_level }}
      os_patch_level: ${{ matrix.os_patch_level }}
      release_tag: ${{ needs.create-release.outputs.release_tag }}
